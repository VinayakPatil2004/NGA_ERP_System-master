    post:
      tags: [Library]
      summary: Issue book to student or staff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueBookRequest'
      responses:
        '200':
          description: Book issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /library/return/{id}:
    put:
      tags: [Library]
      summary: Return a book (by transaction ID)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Transaction ID
      responses:
        '200':
          description: Book returned, fine calculated if overdue

  /library/fines:
    get:
      tags: [Library]
      summary: Get all library fines
      responses:
        '200':
          description: Fines list

  /library/fines/{id}/pay:
    put:

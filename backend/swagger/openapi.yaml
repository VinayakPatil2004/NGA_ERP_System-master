openapi: 3.0.3
info:
  title: Grace ERP System — REST API
  description: |
    ## 🏫 Grace ERP System — Institutional Management Platform

    Complete REST API documentation for the **Grace ERP System** — a full-featured 
    Educational Resource Planning platform for schools and colleges.

    ### 🔐 Authentication
    All protected endpoints require a valid **JWT Bearer Token** in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```

    ### ⚡ Rate Limiting
    Authentication endpoints are rate-limited to **5 requests per 15 minutes** per IP.

    ### 📌 Base URL
    - **Development**: `http://localhost:5000`
    - **Production**: *(configured via environment)*

  version: 1.0.0
  contact:
    name: Grace ERP Support
    email: support@grace-erp.com
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC

servers:
  - url: http://localhost:5000/api
    description: Development Server

tags:
  - name: Authentication
    description: Login, password recovery, device binding
  - name: Academic Year
    description: Manage academic years, promotions, and global stats
  - name: Academic Records
    description: Student and classroom academic records
  - name: Admissions
    description: Admission applications and direct enrollment
  - name: Admin Profile
    description: Administrator profile management
  - name: Announcements
    description: Notice board announcements
  - name: Assignments
    description: Classroom assignments and submissions
  - name: Attendance
    description: Student and staff attendance, self-punch system
  - name: Bulk Import
    description: Excel-based bulk data imports
  - name: Calendar
    description: Institutional calendar events
  - name: Certificates
    description: Bonafide and character certificate workflow
  - name: Leaving Certificates
    description: Student leaving certificate approval workflow
  - name: Classrooms
    description: Classroom management, enrollment, and subjects
  - name: Communication
    description: Messaging, announcements, email/SMS broadcasts, circulars
  - name: Counsellor
    description: Enquiries, follow-ups, and counselling sessions
  - name: Examinations
    description: Exam management, marks entry, report cards
  - name: Fees & Finance
    description: Fee structures, student ledger, expenses, CA reports
  - name: HR
    description: Payroll, salary structures, loans, leave management
  - name: Inventory
    description: Item catalog, suppliers, and transactions
  - name: Library
    description: Book catalog, issue/return, fines, notices
  - name: Parent Portal
    description: Parent access to child data
  - name: Roles
    description: System role management
  - name: Security
    description: Visitor management, gate entry, gate pass, vehicle tracking
  - name: Staff
    description: Staff onboarding, profiles, and management
  - name: Students
    description: Student registry, leaves, fees, and data
  - name: Subjects
    description: Subject master data
  - name: Syllabus
    description: Syllabus tracking and progress
  - name: Teacher
    description: Teacher profile, announcements, assignments
  - name: Timetable
    description: Class and teacher timetable management
  - name: Transport
    description: Vehicle and student transport assignments
  - name: Users
    description: Internal user and personnel account management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login

  schemas:
    # ─── Common ───────────────────────────────────────────────
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Access denied
        error:
          type: string
          example: Detailed error description

    # ─── Auth ─────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          example: admin@grace.com
        password:
          type: string
          format: password
          example: SecurePass123
        rememberMe:
          type: boolean
          example: true
        role:
          type: string
          enum: [admin, principal, hr, teacher, accountant, counsellor, librarian, security_guard, student, parent]
          example: admin

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            username:
              type: string
              example: admin@grace.com
            role:
              type: string
              example: Admin
            userType:
              type: string
              example: admin
            fullName:
              type: string
              example: Administrator

    # ─── Academic Year ─────────────────────────────────────────
    AcademicYear:
      type: object
      properties:
        id:
          type: integer
          example: 3
        year_name:
          type: string
          example: 2026-27
        start_date:
          type: string
          format: date
          example: 2026-06-01
        end_date:
          type: string
          format: date
          example: 2027-05-31
        is_active:
          type: integer
          enum: [0, 1]
          example: 1

    # ─── Staff ────────────────────────────────────────────────
    StaffRecord:
      type: object
      properties:
        id:
          type: integer
          example: 12
        employee_id:
          type: string
          example: NGA/STF/2026/0010
        full_name:
          type: string
          example: Suresh Patil
        role_name:
          type: string
          example: Teacher
        email:
          type: string
          example: suresh@grace.com
        mobile:
          type: string
          example: "9876543210"
        status:
          type: string
          enum: [active, inactive]
          example: active

    StaffOnboardResponse:
      type: object
      properties:
        message:
          type: string
          example: Staff onboarded successfully
        employeeId:
          type: string
          example: NGA/STF/2026/0025
        credentials:
          type: object
          properties:
            username:
              type: string
              example: suresh@grace.com
            password:
              type: string
              example: Abc12345

    # ─── Student ───────────────────────────────────────────────
    StudentRecord:
      type: object
      properties:
        id:
          type: integer
          example: 45
        full_name:
          type: string
          example: Rohan Sharma
        admission_no:
          type: string
          example: ADM-2026-0045
        class:
          type: string
          example: "10"
        section:
          type: string
          example: A
        status:
          type: string
          example: active

    # ─── Book ─────────────────────────────────────────────────
    BookRecord:
      type: object
      properties:
        id:
          type: integer
          example: 5
        title:
          type: string
          example: Introduction to Physics
        author:
          type: string
          example: H.C. Verma
        isbn:
          type: string
          example: "9780123456789"
        rack_number:
          type: string
          example: R-03
        shelf_number:
          type: string
          example: S-02
        available:
          type: boolean
          example: true

    # ─── Issue Book ────────────────────────────────────────────
    IssueBookRequest:
      type: object
      required: [book_id, member_id, member_name, member_class, issue_date, due_date]
      properties:
        book_id:
          type: integer
          example: 4
        member_id:
          type: string
          example: NGA/STF/2026/0002
        member_name:
          type: string
          example: Sachin Kadam
        member_class:
          type: string
          example: Staff
        issue_date:
          type: string
          format: date
          example: 2026-05-29
        due_date:
          type: string
          format: date
          example: 2026-06-12
        academic_year_id:
          type: integer
          example: 3

    # ─── Security / Visitor ────────────────────────────────────
    VisitorRecord:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: Karan Malhotra
        purpose:
          type: string
          example: Academic Inquiry
        person_to_meet:
          type: string
          example: HR Manager
        in_time:
          type: string
          example: "10:30"
        out_time:
          type: string
          example: "12:15"
        status:
          type: string
          enum: [pending, approved, rejected]
          example: approved

    GateEntryRequest:
      type: object
      required: [name, purpose, person_to_meet, in_time]
      properties:
        name:
          type: string
          example: Rajesh Kumar
        purpose:
          type: string
          example: Parent Meeting
        person_to_meet:
          type: string
          example: Principal
        in_time:
          type: string
          example: "09:00"
        academic_year_id:
          type: integer
          example: 3

    # ─── Fee ──────────────────────────────────────────────────
    FeeStructure:
      type: object
      properties:
        id:
          type: integer
        class:
          type: string
          example: "10"
        fee_type:
          type: string
          example: Tuition Fee
        amount:
          type: number
          example: 5000
        frequency:
          type: string
          enum: [monthly, quarterly, annually]
          example: monthly

    # ─── HR ───────────────────────────────────────────────────
    LeaveRequest:
      type: object
      required: [leave_type, from_date, to_date, reason]
      properties:
        leave_type:
          type: string
          enum: [sick, casual, earned, maternity]
          example: sick
        from_date:
          type: string
          format: date
          example: 2026-06-01
        to_date:
          type: string
          format: date
          example: 2026-06-03
        reason:
          type: string
          example: Medical treatment

    # ─── Communication ────────────────────────────────────────
    MessageRequest:
      type: object
      required: [to, subject, body]
      properties:
        to:
          type: integer
          example: 5
        subject:
          type: string
          example: Exam Schedule Notice
        body:
          type: string
          example: Dear Teacher, please review the updated exam schedule.

    # ─── Bulk Import Response ──────────────────────────────────
    BulkImportResponse:
      type: object
      properties:
        message:
          type: string
          example: Import completed
        totalRows:
          type: integer
          example: 150
        inserted:
          type: integer
          example: 142
        failed:
          type: integer
          example: 8
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
                example: 24
              error:
                type: string
                example: Required field missing

security:
  - BearerAuth: []

paths:
  # ════════════════════════════════════════════════════════════
  # AUTHENTICATION
  # ════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login to the ERP System
      description: |
        Authenticates a user and returns a JWT token. 
        Supports all institutional roles.
        
        **Rate Limited**: 5 requests per 15 minutes per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid institutional credentials
        '403':
          description: Account suspended or password expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password recovery
      description: |
        Sends a password recovery email. Returns the same response whether 
        the email exists or not (anti-enumeration protection).
        
        **Rate Limited**: 5 requests per 15 minutes per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: staff@grace.com
      responses:
        '200':
          description: Recovery email sent (or silently ignored if not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If this email exists in our system, recovery instructions have been sent.

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password using recovery token
      description: |
        Resets the user password using a valid recovery token.
        
        **Password Rules**: Minimum 6 characters, at least 1 uppercase letter, at least 1 number.
        
        **Token expiry**: 1 hour from generation.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  example: recovery_token_xyz123
                newPassword:
                  type: string
                  format: password
                  example: NewSecure123
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid token or weak password

  /auth/device-status:
    get:
      tags: [Authentication]
      summary: Check device binding status
      description: Returns whether the current device is trusted/bound to the account.
      responses:
        '200':
          description: Device status

  /auth/bind-device:
    post:
      tags: [Authentication]
      summary: Bind current device to account
      description: Registers the current device fingerprint as trusted.
      responses:
        '200':
          description: Device bound successfully

  # ════════════════════════════════════════════════════════════
  # ACADEMIC YEAR
  # ════════════════════════════════════════════════════════════
  /academic-years/active:
    get:
      tags: [Academic Year]
      summary: Get active academic year (Public)
      description: Returns the currently active academic year. Used for app initialization.
      security: []
      responses:
        '200':
          description: Active academic year
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcademicYear'

  /academic-years/all:
    get:
      tags: [Academic Year]
      summary: Get all academic years
      description: Returns all years. Accessible to all authenticated roles.
      responses:
        '200':
          description: List of all academic years
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AcademicYear'

  /academic-years/stats:
    get:
      tags: [Academic Year]
      summary: Get global institutional statistics
      description: Returns student count, staff count, revenue per academic year.
      responses:
        '200':
          description: Global stats

  /academic-years/dashboard-charts:
    get:
      tags: [Academic Year]
      summary: Get dashboard chart data
      description: Returns chart-ready data for admin/principal dashboard.
      responses:
        '200':
          description: Chart data

  /academic-years/add:
    post:
      tags: [Academic Year]
      summary: Add new academic year
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year_name, start_date, end_date]
              properties:
                year_name:
                  type: string
                  example: 2027-28
                start_date:
                  type: string
                  format: date
                  example: 2027-06-01
                end_date:
                  type: string
                  format: date
                  example: 2028-05-31
      responses:
        '201':
          description: Year created

  /academic-years/update/{id}:
    put:
      tags: [Academic Year]
      summary: Update academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicYear'
      responses:
        '200':
          description: Year updated

  /academic-years/delete/{id}:
    delete:
      tags: [Academic Year]
      summary: Delete academic year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Year deleted

  /academic-years/set-active/{id}:
    put:
      tags: [Academic Year]
      summary: Set academic year as active
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Year set as active

  /academic-years/promote:
    post:
      tags: [Academic Year]
      summary: Promote all students to next academic year
      description: |
        ⚠️ **Critical Operation**: Promotes ALL enrolled students to the next academic year. 
        This action is not easily reversible.
      responses:
        '200':
          description: Students promoted

  # ════════════════════════════════════════════════════════════
  # ACADEMIC RECORDS
  # ════════════════════════════════════════════════════════════
  /academic-records/classroom/{classroom_id}:
    get:
      tags: [Academic Records]
      summary: Get records by classroom
      parameters:
        - name: classroom_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Classroom records

  /academic-records/student/{student_id}:
    get:
      tags: [Academic Records]
      summary: Get records by student
      description: Students can only access their own records.
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Student academic records
        '403':
          description: Access denied

  # ════════════════════════════════════════════════════════════
  # ADMISSIONS
  # ════════════════════════════════════════════════════════════
  /admission/direct-enroll:
    post:
      tags: [Admissions]
      summary: Direct enroll a new student
      description: |
        Directly enroll a student without going through the application process.
        Supports file uploads for admission documents.
        
        **Max file size**: 10 MB per file.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  example: Ananya Sharma
                class:
                  type: string
                  example: "9"
                section:
                  type: string
                  example: A
                academic_year_id:
                  type: integer
                  example: 3
                passportPhoto:
                  type: string
                  format: binary
                birthCert:
                  type: string
                  format: binary
                leavingCert:
                  type: string
                  format: binary
                casteCert:
                  type: string
                  format: binary
                aadharCopy:
                  type: string
                  format: binary
      responses:
        '201':
          description: Student enrolled
        '400':
          description: File too large or validation error

  /admission/all:
    get:
      tags: [Admissions]
      summary: Get all admission applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: academic_year_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of applications

  /admission/stats:
    get:
      tags: [Admissions]
      summary: Get admission statistics
      responses:
        '200':
          description: Admission stats (total, approved, pending, rejected)

  /admission/{id}:
    get:
      tags: [Admissions]
      summary: Get single application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Application details
    put:
      tags: [Admissions]
      summary: Update application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, approved, rejected]
                remarks:
                  type: string
      responses:
        '200':
          description: Application updated
    delete:
      tags: [Admissions]
      summary: Delete application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Application deleted

  # ════════════════════════════════════════════════════════════
  # ADMIN PROFILE
  # ════════════════════════════════════════════════════════════
  /admin/profile:
    get:
      tags: [Admin Profile]
      summary: Get admin profile
      responses:
        '200':
          description: Admin profile data
    put:
      tags: [Admin Profile]
      summary: Update admin profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                email:
                  type: string
                mobile:
                  type: string
      responses:
        '200':
          description: Profile updated

  /admin/profile/change-password:
    put:
      tags: [Admin Profile]
      summary: Change admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed

  # ════════════════════════════════════════════════════════════
  # ANNOUNCEMENTS
  # ════════════════════════════════════════════════════════════
  /announcements/active:
    get:
      tags: [Announcements]
      summary: Get active announcements
      description: Returns all active announcements from the notice board.
      responses:
        '200':
          description: Active announcements

  # ════════════════════════════════════════════════════════════
  # ASSIGNMENTS
  # ════════════════════════════════════════════════════════════
  /assignments/create:
    post:
      tags: [Assignments]
      summary: Create assignment (Teacher)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Chapter 5 Exercise
                description:
                  type: string
                classroom_id:
                  type: integer
                due_date:
                  type: string
                  format: date
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Assignment created

  /assignments/teacher:
    get:
      tags: [Assignments]
      summary: Get teacher's assignments
      responses:
        '200':
          description: List of assignments

  /assignments/classroom/{classroom_id}:
    get:
      tags: [Assignments]
      summary: Get classroom assignments (Student/Parent)
      parameters:
        - name: classroom_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Classroom assignments

  /assignments/submit:
    post:
      tags: [Assignments]
      summary: Submit assignment (Student)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                assignment_id:
                  type: integer
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Submission recorded

  /assignments/{assignment_id}/submissions:
    get:
      tags: [Assignments]
      summary: Get all submissions for assignment
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Submissions list

  /assignments/submissions/{submission_id}/grade:
    put:
      tags: [Assignments]
      summary: Grade a submission (Teacher)
      parameters:
        - name: submission_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                grade:
                  type: string
                  example: A+
                feedback:
                  type: string
      responses:
        '200':
          description: Graded

  /assignments/{assignment_id}:
    put:
      tags: [Assignments]
      summary: Update assignment
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated
    delete:
      tags: [Assignments]
      summary: Delete assignment
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

  # ════════════════════════════════════════════════════════════
  # ATTENDANCE
  # ════════════════════════════════════════════════════════════
  /attendance/students:
    get:
      tags: [Attendance]
      summary: Get all student attendance
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: classroom_id
          in: query
          schema:
            type: integer
      responses:
        '200':

  # USERS / PERSONNEL
  # ════════════════════════════════════════════════════════════
  /users:
    get:
      tags: [Users]
      summary: Get all internal users
      responses:
        '200':
          description: Users list
    post:
      tags: [Users]
      summary: Create new internal user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, roleId]
              properties:
                username:
                  type: string
                  example: hr@grace.com
                password:
                  type: string
                  format: password
                  example: SecurePass123
                roleId:
                  type: integer
                  example: 2
      responses:
        '201':
          description: User created

  /users/{id}:
    put:
      tags: [Users]
      summary: Update user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated
    delete:
      tags: [Users]
      summary: Delete user account permanently
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted

  /users/{id}/toggle-block:
    patch:
      tags: [Users]
      summary: Suspend or restore user account access
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Block status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User block status updated successfully

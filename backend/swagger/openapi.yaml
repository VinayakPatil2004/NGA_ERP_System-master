  # STAFF
  # ════════════════════════════════════════════════════════════
  /staff/onboard:
    post:
      tags: [Staff]
      summary: Onboard new staff member
      description: |
        Creates a new staff profile with auto-generated Employee ID (`NGA/STF/{YEAR}/{SEQ}`)
        and login credentials.
        
        **Employee ID Year** is derived from the selected Academic Year (e.g., `2026-27` → `2026`).
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [full_name, role, academicYear]
              properties:
                full_name:
                  type: string
                  example: Sunita Desai
                role:
                  type: string
                  example: Teacher
                email:
                  type: string
                  format: email
                mobile:
                  type: string
                academicYear:
                  type: string
                  example: 2026-27
                photo:
                  type: string
                  format: binary
                aadhar:
                  type: string
                  format: binary
                pan:
                  type: string
                  format: binary
                addressProof:
                  type: string
                  format: binary
                bankPassbook:
                  type: string
                  format: binary
      responses:
        '201':
          description: Staff onboarded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffOnboardResponse'


  # LIBRARY
  # ════════════════════════════════════════════════════════════
  /library/stats:
    get:
      tags: [Library]
      summary: Get library overview statistics
      responses:
        '200':
          description: Library stats (total books, available, issued, overdue)

  /library/books:
    get:
      tags: [Library]
      summary: Get all books
      parameters:
        - name: academic_year_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Books catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookRecord'
    post:
      tags: [Library]
      summary: Add a new book to catalog
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, author]
              properties:
                title:
                  type: string
                  example: Introduction to Physics
                author:
                  type: string
                  example: H.C. Verma
                isbn:
                  type: string
                rack_number:
                  type: string
                shelf_number:
                  type: string
                quantity:
                  type: integer
      responses:
        '201':
          description: Book added

  /library/books/{id}:
    put:
      tags: [Library]
      summary: Update book (including Rack/Shelf number)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookRecord'
      responses:
        '200':
          description: Book updated
    delete:
      tags: [Library]
      summary: Delete book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book deleted

  /library/transactions:
    get:
      tags: [Library]
      summary: Get all issue/return transactions
      responses:
        '200':
          description: Transactions

